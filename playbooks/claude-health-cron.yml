---
# Sets up the claude -p health check cron job.
# Runs 3x daily and commits health reports to git.

- name: Configure Claude health check cron
  hosts: homelab
  gather_facts: no

  vars:
    health_script: /usr/local/bin/homelab-health-check.sh
    health_data_script: /usr/local/bin/homelab-health-data.sh
    api_key_file: /etc/claude/api_key
    homelab_dir: /home/eslick/homelab
    alert_email: ian@vitalreactor.com

  tasks:
    - name: Ensure /etc/claude directory
      ansible.builtin.file:
        path: /etc/claude
        state: directory
        mode: '0755'
        owner: root
        group: root
      become: yes
      tags: [claude, configure]

    - name: Set api_key file permissions (readable by eslick)
      ansible.builtin.file:
        path: /etc/claude/api_key
        state: file
        mode: '0640'
        owner: root
        group: eslick
      become: yes
      tags: [claude, configure]

    - name: Deploy health data collection script
      ansible.builtin.copy:
        src: ../files/homelab-health-data.sh
        dest: "{{ health_data_script }}"
        mode: '0755'
      become: yes
      tags: [claude, configure]

    - name: Allow eslick to run restic without password (for health checks)
      ansible.builtin.copy:
        dest: /etc/sudoers.d/eslick-restic
        content: "eslick ALL=(root) NOPASSWD: /usr/bin/restic\n"
        mode: '0440'
        validate: 'visudo -cf %s'
      become: yes
      tags: [claude, configure, security]

    - name: Ensure health-reports directory exists
      ansible.builtin.file:
        path: "{{ homelab_dir }}/health-reports"
        state: directory
        mode: '0755'
      tags: [claude]

    - name: Deploy health check script
      ansible.builtin.copy:
        dest: "{{ health_script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          # Claude-driven health check (headless -p mode)
          # Read-only: checks system state, writes report, commits to git
          # Does NOT run playbooks or make changes

          cd {{ homelab_dir }}
          export ANTHROPIC_API_KEY="$(cat {{ api_key_file }} 2>/dev/null)"

          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: No API key found at {{ api_key_file }}" | \
              mail -s "[HOMELAB ERROR] Health check: missing API key" {{ alert_email }}
            exit 1
          fi

          touch /tmp/.health-check-start

          # Collect all system data upfront so Claude only needs to interpret
          HEALTH_DATA="$({{ health_data_script }} 2>&1)"

          claude -p \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash,Write" \
            --max-turns 5 \
            "You are running in HEALTH CHECK MODE. All system data has already been collected — do NOT run any system commands to gather more data.

          Follow the ## Health Check Mode section in CLAUDE.md exactly. Use only the data below to evaluate all six health indicators. Write the markdown report to health-reports/ (prefix with ALERT- if any threshold is exceeded), then run: git add health-reports/ && git commit -m 'health: \$(date +%Y-%m-%d-%H)' && git push

          === SYSTEM DATA ===
          ${HEALTH_DATA}"

          # Email alert if any ALERT- report was created in this run
          ALERT_FILE=$(find {{ homelab_dir }}/health-reports -name "ALERT-$(date +%Y-%m-%d-%H)*" -newer /tmp/.health-check-start 2>/dev/null | head -1)
          if [ -n "$ALERT_FILE" ]; then
            mail -s "[HOMELAB ALERT] $(basename "$ALERT_FILE")" {{ alert_email }} < "$ALERT_FILE"
          fi

          echo "Health check run completed at $(date)"
      become: yes
      tags: [claude]

    - name: Schedule health checks (8am, 2pm, 8pm)
      ansible.builtin.cron:
        name: "claude-health-check-{{ item.name }}"
        minute: "0"
        hour: "{{ item.hour }}"
        job: "{{ health_script }} >> /var/log/claude-health.log 2>&1"
        user: eslick
      loop:
        - { name: morning, hour: "8" }
        - { name: afternoon, hour: "14" }
        - { name: evening, hour: "20" }
      tags: [claude, cron]
