---
# Manages all Docker Compose services.
# Add new containers by:
#   1. Adding an entry to the `services` var
#   2. Creating a template in templates/<service>-compose.yml.j2
#   3. Running: ansible-playbook playbooks/docker.yml --check --diff
#   4. Applying: ansible-playbook playbooks/docker.yml

- name: Manage Docker Compose services
  hosts: homelab
  gather_facts: no

  vars:
    compose_base: /opt/compose
    docker_network: homelab-net

    services:
      - name: cockroachdb
        ports: [26257, 8090]
      - name: minio
        ports: [9000, 9001]
      - name: datomic
        ports: [4334]
      - name: agentos
        ports: []  # 127.0.0.1-bound; nginx handles external access via port 14000

    # Obsidian vault (synced via Syncthing — no secrets here)
    vault_path: /opt/vaults/obsidian
    # Secrets store (not synced — credentials, tokens)
    secrets_path: /opt/secrets
    tailscale_hostname: speedracer.terrier-haddock.ts.net

    # CockroachDB
    cockroachdb_sql_port: 26257
    cockroachdb_ui_port: 8090

    # MinIO
    minio_api_port: 9000
    minio_console_port: 9001
    minio_root_user: minioadmin
    minio_root_password: "{{ lookup('env', 'MINIO_ROOT_PASSWORD') | default('changeme', true) }}"

    # Datomic Transactor
    datomic_port: 4334
    datomic_version: "1.0.7556"

    # AgentOS BEAM cluster
    agentos_src_path: /home/eslick/homelab/projects/agentos
    agentos_beam1_port: 14100
    agentos_beam2_port: 14101
    agentos_port: 14000
    agentos_cookie: "agentos_dev"
    agentos_cluster_nodes: 1  # set to 2 to re-enable beam-2 for cluster testing

  tasks:
    # --- Shared infrastructure ---

    - name: Create shared Docker network
      community.docker.docker_network:
        name: "{{ docker_network }}"
      become: yes
      tags: [docker]

    - name: Ensure compose directories exist
      ansible.builtin.file:
        path: "{{ compose_base }}/{{ item.name }}"
        state: directory
        mode: '0755'
      loop: "{{ services }}"
      become: yes
      tags: [docker]

    - name: Deploy compose files from templates
      ansible.builtin.template:
        src: "../templates/{{ item.name }}-compose.yml.j2"
        dest: "{{ compose_base }}/{{ item.name }}/docker-compose.yml"
        mode: '0644'
      loop: "{{ services | selectattr('managed', 'undefined') | list + services | selectattr('managed', 'defined') | selectattr('managed') | list }}"
      become: yes
      tags: [docker, configure]

    - name: Allow service ports through UFW
      community.general.ufw:
        rule: allow
        port: '{{ item.1 }}'
        proto: tcp
      loop: "{{ services | subelements('ports') }}"
      become: yes
      tags: [docker, security]

    # --- CockroachDB (must start first, Datomic depends on it) ---

    - name: Start CockroachDB
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/cockroachdb"
        state: present
      become: yes
      tags: [docker, service]

    - name: Wait for CockroachDB to accept connections
      ansible.builtin.command: >
        docker exec cockroachdb
        cockroach sql --insecure -e "SELECT 1"
      register: crdb_ready
      until: crdb_ready.rc == 0
      retries: 10
      delay: 3
      changed_when: false
      become: yes
      tags: [docker]

    - name: Create Datomic database in CockroachDB
      ansible.builtin.command: >
        docker exec cockroachdb
        cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS datomic"
      register: crdb_create_db
      changed_when: "'CREATE DATABASE' in crdb_create_db.stdout"
      become: yes
      tags: [docker]

    - name: Create datomic_kvs table in CockroachDB
      ansible.builtin.shell: >
        docker exec cockroachdb cockroach sql --insecure -d datomic -e "
        CREATE TABLE IF NOT EXISTS datomic_kvs (
          id TEXT NOT NULL,
          rev INTEGER,
          map TEXT,
          val BYTES,
          CONSTRAINT pk_id PRIMARY KEY (id)
        );
        GRANT ALL ON TABLE datomic_kvs TO public;"
      register: crdb_table
      changed_when: "'CREATE TABLE' in crdb_table.stdout"
      become: yes
      tags: [docker]

    # --- MinIO ---

    - name: Start MinIO
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/minio"
        state: present
      become: yes
      tags: [docker, service]

    # --- AgentOS BEAM cluster ---

    - name: Ensure agentos compose directory exists
      ansible.builtin.file:
        path: "{{ compose_base }}/agentos"
        state: directory
        mode: '0755'
      become: yes
      tags: [agentos, configure]

    - name: Deploy agentos compose file from template
      ansible.builtin.template:
        src: "../templates/agentos-compose.yml.j2"
        dest: "{{ compose_base }}/agentos/docker-compose.yml"
        mode: '0644'
      become: yes
      tags: [agentos, configure]

    - name: Create agent_os_dev database in CockroachDB
      ansible.builtin.command: >
        docker exec cockroachdb
        cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS agent_os_dev"
      register: agentos_crdb_db
      changed_when: "'CREATE DATABASE' in agentos_crdb_db.stdout"
      become: yes
      tags: [agentos]

    - name: Create AgentOS artifacts bucket in MinIO
      ansible.builtin.command: >
        docker run --rm --network {{ docker_network }} --entrypoint sh minio/mc -c "
          mc alias set local http://minio:9000 {{ minio_root_user }} {{ minio_root_password }} &&
          mc mb --ignore-existing local/artifacts"
      register: agentos_bucket
      changed_when: "'Bucket created' in agentos_bucket.stdout"
      become: yes
      tags: [agentos]

    - name: Build AgentOS dev image
      ansible.builtin.command:
        cmd: >
          docker compose -f {{ compose_base }}/agentos/docker-compose.yml
          build beam-1
      become: yes
      register: agentos_build
      changed_when: "'writing image' in agentos_build.stdout"
      tags: [agentos, service]

    - name: Run AgentOS migrations and seeds (one-off container, before starting servers)
      ansible.builtin.command:
        cmd: >
          docker compose -f {{ compose_base }}/agentos/docker-compose.yml
          run --rm beam-1 sh -c "mix ecto.migrate && mix run priv/repo/seeds.exs"
      become: yes
      register: agentos_migrate
      changed_when: "'Migrated' in agentos_migrate.stderr or 'Created' in agentos_migrate.stdout"
      # CockroachDB DDL auto-commits mid-transaction; Ecto's rollback handler
      # panics with rc=1 even when all migrations succeeded. Treat rc=1 with
      # the known MatchError as a warning, not a hard failure.
      failed_when: >
        agentos_migrate.rc not in [0, 1] or
        (agentos_migrate.rc == 1 and
         'MatchError' not in agentos_migrate.stderr and
         'TransactionError' not in agentos_migrate.stderr)
      when: not ansible_check_mode
      tags: [agentos, service]

    - name: Start beam-1
      ansible.builtin.command:
        cmd: >
          docker compose -f {{ compose_base }}/agentos/docker-compose.yml
          up -d --no-deps beam-1
      become: yes
      register: agentos_beam1_up
      changed_when: "'Started' in agentos_beam1_up.stdout or 'Created' in agentos_beam1_up.stdout"
      tags: [agentos, service]

    - name: Wait for beam-1 Phoenix endpoint to respond
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ agentos_beam1_port }}"
        status_code: [200, 301, 302, 303]
        timeout: 5
      register: agentos_beam1_health
      until: agentos_beam1_health.status in [200, 301, 302, 303]
      retries: 24
      delay: 5
      when: not ansible_check_mode
      tags: [agentos, service]

    - name: Start beam-2 (reuses compiled deps/build volumes)
      ansible.builtin.command:
        cmd: >
          docker compose -f {{ compose_base }}/agentos/docker-compose.yml
          up -d --no-deps beam-2
      become: yes
      register: agentos_beam2_up
      changed_when: "'Started' in agentos_beam2_up.stdout or 'Created' in agentos_beam2_up.stdout"
      when: agentos_cluster_nodes | int >= 2
      tags: [agentos, service]

    - name: Stop beam-2 when running single-node
      ansible.builtin.command:
        cmd: >
          docker compose -f {{ compose_base }}/agentos/docker-compose.yml
          stop beam-2
      become: yes
      register: agentos_beam2_stop
      changed_when: "'Stopped' in agentos_beam2_stop.stderr"
      failed_when: false
      when: agentos_cluster_nodes | int < 2
      tags: [agentos, service]

    # --- Datomic Transactor ---

    - name: Deploy Datomic Dockerfile
      ansible.builtin.template:
        src: "../templates/datomic-Dockerfile.j2"
        dest: "{{ compose_base }}/datomic/Dockerfile"
        mode: '0644'
      become: yes
      tags: [docker, configure]

    - name: Deploy Datomic transactor properties
      ansible.builtin.template:
        src: "../templates/datomic-transactor.properties.j2"
        dest: "{{ compose_base }}/datomic/transactor.properties"
        mode: '0640'
      become: yes
      tags: [docker, configure]

    - name: Build and start Datomic transactor
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/datomic"
        state: present
        build: always
      become: yes
      tags: [docker, service]

    # --- OpenClaw Gateway (removed) ---

    - name: Stop and remove openclaw container (keep data volume)
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/openclaw"
        state: absent
        remove_volumes: false
      become: yes
      failed_when: false
      tags: [openclaw, cleanup]

    - name: Remove openclaw compose directory
      ansible.builtin.file:
        path: "{{ compose_base }}/openclaw"
        state: absent
      become: yes
      tags: [openclaw, cleanup]

    - name: Remove openclaw model cache directory
      ansible.builtin.file:
        path: /opt/cache/openclaw
        state: absent
      become: yes
      tags: [openclaw, cleanup]

    - name: Remove UFW allow rule for openclaw gateway port
      community.general.ufw:
        rule: allow
        port: '18789'
        proto: tcp
        delete: yes
      become: yes
      tags: [openclaw, cleanup, security]

    - name: Remove UFW allow rule for openclaw manifest port
      community.general.ufw:
        rule: allow
        port: '2099'
        proto: tcp
        delete: yes
      become: yes
      tags: [openclaw, cleanup, security]
