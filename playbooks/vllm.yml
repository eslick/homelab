---
# Deploys vLLM for local Gemma-4 inference with GPU access.
#
# Manifest tier → model mapping (after this playbook):
#   simple         → vLLM / cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit  (AWQ-Marlin, prefix-cached)
#   standard       → vLLM / cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit  (AWQ-Marlin, prefix-cached)
#   small          → vLLM / cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit  (AWQ-Marlin, prefix-cached)
#   local-advanced → vLLM / cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit  (AWQ-Marlin, prefix-cached)
#   advanced       → together / Qwen3.5-397B-A17B                  (frontier MoE)
#   complex        → together / deepseek-ai/DeepSeek-V3.1          (frontier)
#   reasoning      → together / moonshotai/Kimi-K2.5               (reasoning)
#   thinking       → openai / o4-mini                              (reasoning)
#
# VRAM budget (2× RTX 3090, 24 GB each, tensor-parallel-size 2):
#   AWQ-4bit weights ~13 GB split across both GPUs (~6.5 GB/card), leaving ~15 GB/card for KV cache.
#   max-model-len=65536 exploits the extra headroom. gpu-memory-utilization capped at 0.90 per card.
#   DO NOT raise gpu-memory-utilization above 0.90 without checking nvidia-smi headroom.

- name: Deploy vLLM GPU container
  hosts: homelab
  gather_facts: no

  vars:
    compose_base: /opt/compose
    docker_network: homelab-net
    docker_bridge_subnet: 172.18.0.0/16

    vllm_port: 8081
    vllm_model_id: "cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit"
    vllm_served_model_name: "gemma-4"
    vllm_tensor_parallel_size: 2       # both RTX 3090s; NVLink not required for AWQ-Marlin
    vllm_max_model_len: 65536          # 64k context; 2x VRAM (2×21.6 GB) gives headroom for larger KV cache
    vllm_gpu_memory_fraction: "0.90"   # 90% of each GPU's 24 GB = 21.6 GB per card

  tasks:

    # --- vLLM compose deployment ---

    - name: Create vLLM compose directory
      ansible.builtin.file:
        path: "{{ compose_base }}/vllm"
        state: directory
        mode: '0755'
      become: yes
      tags: [install, vllm]

    - name: Deploy vLLM compose file from template
      ansible.builtin.template:
        src: ../templates/vllm-compose.yml.j2
        dest: "{{ compose_base }}/vllm/docker-compose.yml"
        mode: '0644'
      become: yes
      tags: [configure, vllm]

    - name: Pull official vLLM gemma4 image
      community.docker.docker_image:
        name: "vllm/vllm-openai:gemma4"
        source: pull
        force_source: no
      become: yes
      tags: [docker, vllm]

    - name: Start vLLM container
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/vllm"
        state: present
      become: yes
      tags: [docker, vllm]

    # --- UFW rules for vLLM port ---

    - name: Allow vLLM port from localhost
      community.general.ufw:
        rule: allow
        port: "{{ vllm_port }}"
        proto: tcp
        from_ip: 127.0.0.1
      become: yes
      tags: [security, vllm]

    - name: Allow vLLM port from Docker bridge subnet
      community.general.ufw:
        rule: allow
        port: "{{ vllm_port }}"
        proto: tcp
        from_ip: "{{ docker_bridge_subnet }}"
      become: yes
      tags: [security, vllm]

    - name: Deny vLLM port from everywhere else
      community.general.ufw:
        rule: deny
        port: "{{ vllm_port }}"
        proto: tcp
      become: yes
      tags: [security, vllm]

    # --- Manifest routing (vLLM provider + tier assignments) ---
    # Runs inside openclaw-gateway where Manifest DB is accessible.

    - name: Render vLLM Manifest setup script
      ansible.builtin.template:
        src: ../templates/manifest-vllm-setup.sh.j2
        dest: /tmp/manifest-vllm-setup.sh
        mode: '0700'
      tags: [manifest, vllm, configure]

    - name: Copy vLLM Manifest setup script into openclaw-gateway
      ansible.builtin.command:
        cmd: docker cp /tmp/manifest-vllm-setup.sh openclaw-gateway:/tmp/manifest-vllm-setup.sh
      become: yes
      changed_when: false
      tags: [manifest, vllm, configure]

    - name: Run vLLM Manifest setup in openclaw-gateway
      ansible.builtin.command:
        cmd: docker exec openclaw-gateway sh /tmp/manifest-vllm-setup.sh
      become: yes
      register: manifest_vllm_result
      changed_when: "'Created' in manifest_vllm_result.stdout"
      tags: [manifest, vllm, configure]

    # --- Clean up legacy inference backends (Ollama, TGI) ---

    - name: Remove TGI compose directory
      ansible.builtin.file:
        path: "{{ compose_base }}/tgi"
        state: absent
      become: yes
      tags: [cleanup, vllm]

    - name: Remove TGI Docker volume
      community.docker.docker_volume:
        name: tgi_tgi-models
        state: absent
      become: yes
      tags: [cleanup, vllm]

    - name: Remove Ollama systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d
        state: absent
      become: yes
      notify: reload systemd
      tags: [cleanup, vllm]

    - name: Remove Ollama binary
      ansible.builtin.file:
        path: /usr/local/bin/ollama
        state: absent
      become: yes
      tags: [cleanup, vllm]

    - name: Remove Ollama systemd unit
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service
        state: absent
      become: yes
      notify: reload systemd
      tags: [cleanup, vllm]

    - name: Remove Ollama model data
      ansible.builtin.file:
        path: /usr/share/ollama/.ollama/models
        state: absent
      become: yes
      tags: [cleanup, vllm]

    - name: Remove Ollama user home directory
      ansible.builtin.file:
        path: /usr/share/ollama
        state: absent
      become: yes
      tags: [cleanup, vllm]

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
      become: yes
