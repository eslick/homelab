---
# Deploys vLLM inference server on dual RTX 3090 (TP=2).
#
# VRAM budget (2× RTX 3090, 24 GB each, tensor-parallel-size 2):
#   Gemma 4 26B AWQ-4bit weights ~14-16 GB total (~7-8 GB/card) — same for A3B and A4B variants.
#   fp8 KV is unsupported for Gemma 4 on Ampere (Triton attn uses fp8e4nv); BF16 KV required.
#   max-model-len=63488 — ceiling for BF16 KV on 48GB (131072/65536 OOM; 63488 confirmed usable).
#   A3B active params (~3B) vs A4B (~4B): same VRAM footprint, ~10-15% faster decode per forward pass.
#   DO NOT raise gpu-memory-utilization above 0.90 without checking nvidia-smi headroom.
#
# Model options (override with -e):
#   Gemma 4 27B A4B: vllm_model_id=cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit  vllm_served_model_name=gemma4-27b      vllm_image=vllm/vllm-openai:gemma4
#   Gemma 4 27B A3B: vllm_model_id=cyankiwi/gemma-4-26B-A3B-it-AWQ-4bit  vllm_served_model_name=gemma4-27b-a3b  vllm_image=vllm/vllm-openai:gemma4
#   Qwen3-30B:       vllm_model_id=QuixiAI/Qwen3-30B-A3B-AWQ             vllm_served_model_name=qwen3-30b-a3b   vllm_image=vllm/vllm-openai:gemma4
#   Qwen3.6-35B:     vllm_model_id=QuantTrio/Qwen3.6-35B-A3B-AWQ         vllm_served_model_name=qwen3.6-35b-a3b vllm_image=vllm/vllm-openai:gemma4  vllm_max_model_len=65536 "vllm_extra_args=--max-num-batched-tokens 4096"
#   gpt-oss-20b:     vllm_model_id=openai/gpt-oss-20b                    vllm_served_model_name=gpt-oss-20b     vllm_image=vllm/vllm-openai:latest  vllm_max_model_len=32768

- name: Deploy vLLM GPU container
  hosts: homelab
  gather_facts: no

  vars:
    compose_base: /opt/compose
    docker_network: homelab-net
    docker_bridge_subnet: 172.18.0.0/16

    vllm_port: 8081
    vllm_image: "vllm/vllm-openai:gemma4"
    vllm_model_id: "QuantTrio/Qwen3.6-35B-A3B-AWQ"
    vllm_served_model_name: "qwen3.6-35b-a3b"
    vllm_tensor_parallel_size: 2
    vllm_max_model_len: 65536
    vllm_gpu_memory_fraction: "0.90"
    vllm_kv_cache_dtype: "fp8"
    vllm_extra_args: "--max-num-batched-tokens 4096 --max-num-seqs 16"

  tasks:

    # --- vLLM compose deployment ---

    - name: Create vLLM compose directory
      ansible.builtin.file:
        path: "{{ compose_base }}/vllm"
        state: directory
        mode: '0755'
      become: yes
      tags: [install, vllm]

    - name: Deploy vLLM compose file from template
      ansible.builtin.template:
        src: ../templates/vllm-compose.yml.j2
        dest: "{{ compose_base }}/vllm/docker-compose.yml"
        mode: '0644'
      become: yes
      tags: [configure, vllm]

    - name: Pull official vLLM gemma4 image
      community.docker.docker_image:
        name: "vllm/vllm-openai:gemma4"
        source: pull
        force_source: no
      become: yes
      tags: [docker, vllm]

    - name: Start vLLM container
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/vllm"
        state: present
      become: yes
      tags: [docker, vllm]

    # --- UFW rules for vLLM port ---

    - name: Allow vLLM port from localhost
      community.general.ufw:
        rule: allow
        port: "{{ vllm_port }}"
        proto: tcp
        from_ip: 127.0.0.1
      become: yes
      tags: [security, vllm]

    - name: Allow vLLM port from Docker bridge subnet
      community.general.ufw:
        rule: allow
        port: "{{ vllm_port }}"
        proto: tcp
        from_ip: "{{ docker_bridge_subnet }}"
      become: yes
      tags: [security, vllm]

    - name: Deny vLLM port from everywhere else
      community.general.ufw:
        rule: deny
        port: "{{ vllm_port }}"
        proto: tcp
      become: yes
      tags: [security, vllm]

    # --- Clean up legacy inference backends (Ollama, TGI) ---

    - name: Remove TGI compose directory
      ansible.builtin.file:
        path: "{{ compose_base }}/tgi"
        state: absent
      become: yes
      tags: [cleanup, vllm]

    - name: Remove TGI Docker volume
      community.docker.docker_volume:
        name: tgi_tgi-models
        state: absent
      become: yes
      tags: [cleanup, vllm]

    - name: Remove Ollama systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d
        state: absent
      become: yes
      notify: reload systemd
      tags: [cleanup, vllm]

    - name: Remove Ollama binary
      ansible.builtin.file:
        path: /usr/local/bin/ollama
        state: absent
      become: yes
      tags: [cleanup, vllm]

    - name: Remove Ollama systemd unit
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service
        state: absent
      become: yes
      notify: reload systemd
      tags: [cleanup, vllm]

    - name: Remove Ollama model data
      ansible.builtin.file:
        path: /usr/share/ollama/.ollama/models
        state: absent
      become: yes
      tags: [cleanup, vllm]

    - name: Remove Ollama user home directory
      ansible.builtin.file:
        path: /usr/share/ollama
        state: absent
      become: yes
      tags: [cleanup, vllm]

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
      become: yes
