---
- name: Mount NAS for backups
  hosts: homelab
  gather_facts: no

  vars:
    nas_ip: 192.168.50.101
    nas_share: ServerBackup
    nas_user: eslick
    nas_mount_point: /mnt/nas
    nas_credentials_file: /etc/nas-credentials

  tasks:
    - name: Install cifs-utils
      ansible.builtin.apt:
        name: cifs-utils
        state: present
        update_cache: yes
      become: yes
      tags: [install]

    - name: Create NAS mount point
      ansible.builtin.file:
        path: "{{ nas_mount_point }}"
        state: directory
        mode: '0755'
        owner: root
        group: root
      become: yes
      tags: [configure]

    - name: Deploy NAS credentials file
      ansible.builtin.template:
        src: ../templates/nas-credentials.j2
        dest: "{{ nas_credentials_file }}"
        mode: '0600'
        owner: root
        group: root
      become: yes
      tags: [configure]

    - name: Add NAS mount to fstab
      ansible.posix.mount:
        src: "//{{ nas_ip }}/{{ nas_share }}"
        path: "{{ nas_mount_point }}"
        fstype: cifs
        opts: "credentials={{ nas_credentials_file }},uid=root,gid=root,iocharset=utf8,vers=3.0,cache=none,_netdev,nofail"
        state: mounted
      become: yes
      tags: [configure]

    - name: Ensure backups subdirectory exists
      ansible.builtin.file:
        path: "{{ nas_mount_point }}/backups/homelab"
        state: directory
        mode: '0755'
        owner: root
        group: root
      become: yes
      tags: [configure]

    # RAID5 local array (md0) — 4× WD Red 3.6TB, ext4, ~11TB usable
    - name: Create /mnt/data mount point
      ansible.builtin.file:
        path: /mnt/data
        state: directory
        mode: '0755'
        owner: root
        group: root
      become: yes
      tags: [configure, raid]

    - name: Add md0 to fstab and ensure mounted
      ansible.posix.mount:
        src: UUID=494b6fb6-44cf-4ebc-ac7f-db374a749fd2
        path: /mnt/data
        fstype: ext4
        opts: defaults,nofail,_netdev
        state: mounted
      become: yes
      tags: [configure, raid]

    - name: Ensure mdadm.conf reflects current array
      ansible.builtin.shell:
        cmd: mdadm --detail --scan > /etc/mdadm/mdadm.conf
      become: yes
      changed_when: true
      tags: [configure, raid]

    - name: Update initramfs to include mdadm config
      ansible.builtin.command:
        cmd: update-initramfs -u
      become: yes
      changed_when: true
      tags: [configure, raid]
