---
- name: System baseline
  hosts: homelab
  gather_facts: yes

  tasks:
    - name: Ensure essential packages are installed
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - htop
          - unzip
          - fail2ban
          - ufw
          - restic
          - jq
          - kitty-terminfo
          - docker-compose-v2
          - pandoc
          - avahi-daemon
          - libnss-mdns
          - socat
        state: present
        update_cache: yes
      become: yes
      tags: [install]

    - name: Configure passwordless sudo for eslick
      ansible.builtin.copy:
        src: ../files/sudoers-eslick
        dest: /etc/sudoers.d/eslick
        mode: '0440'
        owner: root
        group: root
        validate: 'visudo -cf %s'
      become: yes
      tags: [configure, security]

    - name: Set timezone to US/Pacific
      community.general.timezone:
        name: America/Los_Angeles
      become: yes
      tags: [configure]

    - name: Install chrony (replaces systemd-timesyncd for gradual clock slewing)
      ansible.builtin.apt:
        name: chrony
        state: present
        update_cache: yes
      become: yes
      tags: [install, ntp]

    - name: Disable systemd-timesyncd (conflicts with chrony)
      ansible.builtin.service:
        name: systemd-timesyncd
        state: stopped
        enabled: no
      become: yes
      ignore_errors: yes  # may already be stopped/masked after chrony install
      tags: [configure, ntp]

    - name: Ensure chrony is running and enabled
      ansible.builtin.service:
        name: chrony
        state: started
        enabled: yes
      become: yes
      tags: [service, ntp]

    - name: Allow SSH through UFW
      ansible.builtin.command: ufw allow OpenSSH
      become: yes
      changed_when: true
      tags: [security]

    - name: Enable UFW
      ansible.builtin.command: ufw --force enable
      become: yes
      changed_when: true
      tags: [security]

    - name: Ensure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
      become: yes
      tags: [service, docker]

    - name: Ensure fail2ban is running
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: yes
      become: yes
      tags: [service, security]

    - name: Configure avahi to advertise on LAN interface only
      ansible.builtin.lineinfile:
        path: /etc/avahi/avahi-daemon.conf
        regexp: '^#?allow-interfaces='
        line: 'allow-interfaces=enp69s0'
      become: yes
      notify: Restart avahi
      tags: [configure, network]

    - name: Ensure avahi-daemon is running (mDNS / .local resolution)
      ansible.builtin.service:
        name: avahi-daemon
        state: started
        enabled: yes
      become: yes
      tags: [service, network]

    - name: Allow mDNS through UFW
      community.general.ufw:
        rule: allow
        port: '5353'
        proto: udp
      become: yes
      tags: [security, network]

    - name: Add Tailscale apt repository key
      ansible.builtin.shell:
        cmd: curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
        creates: /usr/share/keyrings/tailscale-archive-keyring.gpg
      become: yes
      tags: [install, tailscale]

    - name: Add Tailscale apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
        state: present
        filename: tailscale
      become: yes
      tags: [install, tailscale]

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: yes
      become: yes
      tags: [install, tailscale]

    - name: Ensure tailscaled systemd override directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/tailscaled.service.d
        state: directory
        mode: '0755'
      become: yes
      tags: [configure, tailscale]

    - name: Configure tailscale to start with --accept-dns=false
      ansible.builtin.copy:
        dest: /etc/systemd/system/tailscaled.service.d/override.conf
        mode: '0644'
        content: |
          [Service]
          ExecStartPost=/usr/bin/tailscale up --accept-dns=false
      become: yes
      notify: Reload systemd and restart tailscaled
      tags: [configure, tailscale]

    - name: Ensure tailscaled is running and enabled
      ansible.builtin.service:
        name: tailscaled
        state: started
        enabled: yes
      become: yes
      tags: [service, tailscale]

    - name: Allow Tailscale through UFW
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
      become: yes
      ignore_errors: yes  # interface may not exist until tailscale up is run
      tags: [security, tailscale]

    - name: Generate default postfix configuration
      ansible.builtin.copy:
        src: /usr/share/postfix/main.cf.debian
        dest: /etc/postfix/main.cf
        remote_src: yes
        force: no
      become: yes
      tags: [configure]

    - name: Ensure postfix is running
      ansible.builtin.service:
        name: postfix
        state: started
        enabled: yes
      become: yes
      tags: [service]

    - name: Add GitHub CLI apt repository key
      ansible.builtin.shell:
        cmd: curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg
        creates: /usr/share/keyrings/githubcli-archive-keyring.gpg
      become: yes
      tags: [install, github]

    - name: Add GitHub CLI apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        state: present
        filename: github-cli
      become: yes
      tags: [install, github]

    - name: Install GitHub CLI
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: yes
      become: yes
      tags: [install, github]

    - name: Install MCP Toolbox for Databases (genai-toolbox)
      ansible.builtin.get_url:
        url: "https://storage.googleapis.com/genai-toolbox/v0.31.0/linux/amd64/toolbox"
        dest: /usr/local/bin/toolbox
        mode: '0755'
        checksum: "sha256:f709e43f45b899a5c84abdfd1b2082ff5187c4d133c5a824c83411e2fc880e24"
      become: yes
      tags: [install, cockroachdb]

    - name: Install Go (required for sonoscli)
      ansible.builtin.apt:
        name: golang-go
        state: present
      become: yes
      tags: [install, sonos]

    - name: Install sonoscli
      ansible.builtin.shell:
        cmd: go install github.com/steipete/sonoscli/cmd/sonos@latest
        creates: /home/eslick/go/bin/sonos
      become: yes
      become_user: eslick
      environment:
        HOME: /home/eslick
        GOPATH: /home/eslick/go
      tags: [install, sonos]

    - name: Remove old npm global Claude installation
      ansible.builtin.command:
        cmd: npm -g uninstall @anthropic-ai/claude-code
        removes: /usr/local/bin/claude
      become: yes
      tags: [install, claude]

    - name: Install Claude Code (native installer, user-space)
      ansible.builtin.shell:
        cmd: curl -fsSL https://claude.ai/install.sh | sh
        creates: /home/eslick/.local/bin/claude
      become: yes
      become_user: eslick
      tags: [install, claude]

    - name: Update Claude Code to latest version
      ansible.builtin.command:
        cmd: /home/eslick/.local/bin/claude update
      become: yes
      become_user: eslick
      register: claude_update_result
      changed_when: "'updated to' in claude_update_result.stdout"
      tags: [configure, claude]

    - name: Deploy homelab CLI wrapper
      ansible.builtin.copy:
        dest: /usr/local/bin/homelab
        mode: '0755'
        content: |
          #!/bin/bash
          # Launch Claude Code in the homelab repo with auto-approval
          # Default: sonnet for cost efficiency. Use --model claude-opus-4-6 when needed.
          cd /home/eslick/homelab
          exec /home/eslick/.local/bin/claude --dangerously-skip-permissions --model claude-sonnet-4-6 "$@"
      become: yes
      tags: [configure, claude]

    - name: Install lm-sensors for CPU temperature monitoring
      ansible.builtin.apt:
        name: lm-sensors
        state: present
        update_cache: no
      become: yes
      tags: [install, monitoring]

    - name: Ensure /var/log/homelab directory exists
      ansible.builtin.file:
        path: /var/log/homelab
        state: directory
        mode: '0755'
        owner: eslick
        group: eslick
      become: yes
      tags: [configure, monitoring]

    - name: Deploy check-temps script
      ansible.builtin.copy:
        src: ../files/check-temps.sh
        dest: /usr/local/bin/check-temps
        mode: '0755'
      become: yes
      tags: [configure, monitoring]

  handlers:
    - name: Restart avahi
      ansible.builtin.service:
        name: avahi-daemon
        state: restarted
      become: yes

    - name: Reload systemd and restart tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        state: restarted
        daemon_reload: yes
      become: yes
