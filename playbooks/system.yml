---
- name: System baseline
  hosts: homelab
  gather_facts: yes

  tasks:
    - name: Ensure essential packages are installed
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - htop
          - unzip
          - fail2ban
          - ufw
          - restic
          - jq
        state: present
        update_cache: yes
      become: yes
      tags: [install]

    - name: Set timezone to US/Pacific
      community.general.timezone:
        name: America/Los_Angeles
      become: yes
      tags: [configure]

    - name: Allow SSH through UFW
      ansible.builtin.command: ufw allow OpenSSH
      become: yes
      changed_when: true
      tags: [security]

    - name: Enable UFW
      ansible.builtin.command: ufw --force enable
      become: yes
      changed_when: true
      tags: [security]

    - name: Ensure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
      become: yes
      tags: [service, docker]

    - name: Ensure fail2ban is running
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: yes
      become: yes
      tags: [service, security]
