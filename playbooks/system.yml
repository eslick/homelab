---
- name: System baseline
  hosts: homelab
  gather_facts: yes

  tasks:
    - name: Ensure essential packages are installed
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - htop
          - unzip
          - fail2ban
          - ufw
          - restic
          - jq
          - kitty-terminfo
          - docker-compose-v2
        state: present
        update_cache: yes
      become: yes
      tags: [install]

    - name: Configure passwordless sudo for eslick
      ansible.builtin.copy:
        src: ../files/sudoers-eslick
        dest: /etc/sudoers.d/eslick
        mode: '0440'
        owner: root
        group: root
        validate: 'visudo -cf %s'
      become: yes
      tags: [configure, security]

    - name: Set timezone to US/Pacific
      community.general.timezone:
        name: America/Los_Angeles
      become: yes
      tags: [configure]

    - name: Allow SSH through UFW
      ansible.builtin.command: ufw allow OpenSSH
      become: yes
      changed_when: true
      tags: [security]

    - name: Enable UFW
      ansible.builtin.command: ufw --force enable
      become: yes
      changed_when: true
      tags: [security]

    - name: Ensure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
      become: yes
      tags: [service, docker]

    - name: Ensure fail2ban is running
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: yes
      become: yes
      tags: [service, security]

    - name: Generate default postfix configuration
      ansible.builtin.command:
        cmd: dpkg-reconfigure -f noninteractive postfix
        creates: /etc/postfix/main.cf
      become: yes
      tags: [configure]

    - name: Ensure postfix is running
      ansible.builtin.service:
        name: postfix
        state: started
        enabled: yes
      become: yes
      tags: [service]
