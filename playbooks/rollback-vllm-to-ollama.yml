---
# Rolls back vLLM to Ollama. Run once, then delete this file.

- name: Rollback vLLM → Ollama
  hosts: homelab
  gather_facts: no

  vars:
    docker_bridge_subnet: 172.18.0.0/16
    compose_base: /opt/compose

  tasks:

    # --- Remove vLLM ---

    - name: Stop vLLM compose project
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/vllm"
        state: absent
      become: yes
      failed_when: false
      tags: [vllm, remove]

    - name: Remove vllm compose directory
      ansible.builtin.file:
        path: "{{ compose_base }}/vllm"
        state: absent
      become: yes
      tags: [vllm, remove]

    - name: Remove UFW rules for vLLM port 8000
      community.general.ufw:
        rule: allow
        port: '8000'
        proto: tcp
        from_ip: "{{ item }}"
        delete: yes
      loop:
        - 127.0.0.1
        - "{{ docker_bridge_subnet }}"
      become: yes
      failed_when: false
      tags: [vllm, remove, security]

    - name: Remove logrotate config for vLLM
      ansible.builtin.file:
        path: /etc/logrotate.d/vllm
        state: absent
      become: yes
      tags: [vllm, remove]

    # --- Restore Ollama ---

    - name: Install Ollama
      ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama
      become: yes
      tags: [ollama, install]

    - name: Create Ollama systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d
        state: directory
        mode: '0755'
      become: yes
      tags: [ollama, configure]

    - name: Bind Ollama to all interfaces so Docker containers can reach it
      ansible.builtin.copy:
        dest: /etc/systemd/system/ollama.service.d/override.conf
        mode: '0644'
        content: |
          [Service]
          Environment="OLLAMA_HOST=0.0.0.0:11434"
      become: yes
      tags: [ollama, configure]

    - name: Enable and start Ollama
      ansible.builtin.systemd:
        name: ollama
        state: started
        enabled: yes
        daemon_reload: yes
      become: yes
      tags: [ollama, service]

    - name: Allow port 11434 from localhost
      community.general.ufw:
        rule: allow
        port: '11434'
        proto: tcp
        from_ip: 127.0.0.1
      become: yes
      tags: [ollama, security]

    - name: Allow port 11434 from Docker bridge
      community.general.ufw:
        rule: allow
        port: '11434'
        proto: tcp
        from_ip: "{{ docker_bridge_subnet }}"
      become: yes
      tags: [ollama, security]

    - name: Deny port 11434 from everywhere else
      community.general.ufw:
        rule: deny
        port: '11434'
        proto: tcp
      become: yes
      tags: [ollama, security]
