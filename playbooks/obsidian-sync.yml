---
# Deploys the Obsidian vault sync service.
# Watches CouchDB's _changes feed in real-time (systemd service)
# with a full-sync cron job every 5 minutes as a fallback.
#
# Usage:
#   ansible-playbook playbooks/obsidian-sync.yml --check --diff
#   ansible-playbook playbooks/obsidian-sync.yml

- name: Deploy Obsidian vault sync service
  hosts: homelab
  gather_facts: no

  vars:
    vault_path: /opt/vaults/obsidian
    scripts_dir: /opt/scripts
    couchdb_port: 5984
    couchdb_admin_user: "{{ vault_couchdb_admin_user }}"
    couchdb_admin_password: "{{ vault_couchdb_admin_password }}"
    couchdb_database: obsidian

  tasks:

    - name: Install python3-requests
      ansible.builtin.apt:
        name: python3-requests
        state: present
        update_cache: no
      become: yes
      tags: [install]

    - name: Ensure vault directory exists
      ansible.builtin.file:
        path: "{{ vault_path }}"
        state: directory
        mode: '0755'
      become: yes
      tags: [configure]

    - name: Ensure scripts directory exists
      ansible.builtin.file:
        path: "{{ scripts_dir }}"
        state: directory
        mode: '0755'
      become: yes
      tags: [configure]

    - name: Deploy obsidian-sync script
      ansible.builtin.template:
        src: ../templates/obsidian-sync.py.j2
        dest: "{{ scripts_dir }}/obsidian-sync.py"
        mode: '0755'
      become: yes
      notify: Restart obsidian-sync
      tags: [configure]

    - name: Deploy obsidian-sync systemd service
      ansible.builtin.template:
        src: ../templates/obsidian-sync.service.j2
        dest: /etc/systemd/system/obsidian-sync.service
        mode: '0644'
      become: yes
      notify:
        - Reload systemd
        - Restart obsidian-sync
      tags: [service]

    - name: Enable and start obsidian-sync service
      ansible.builtin.systemd:
        name: obsidian-sync
        enabled: yes
        state: started
        daemon_reload: yes
      become: yes
      when: not ansible_check_mode
      tags: [service]

    - name: Install inotify-tools
      ansible.builtin.apt:
        name: inotify-tools
        state: present
        update_cache: no
      become: yes
      tags: [install]

    - name: Ensure /opt/obsidian directory exists
      ansible.builtin.file:
        path: /opt/obsidian
        state: directory
        mode: '0755'
      become: yes
      tags: [configure]

    - name: Deploy vault writeback script
      ansible.builtin.template:
        src: ../templates/vault-writeback.sh.j2
        dest: /opt/obsidian/vault-writeback.sh
        mode: '0755'
      become: yes
      notify: Restart obsidian-vault-writeback
      tags: [configure]

    - name: Deploy vault writeback systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/obsidian-vault-writeback.service
        content: |
          # Managed by Ansible — do not edit directly
          # See playbooks/obsidian-sync.yml

          [Unit]
          Description=Obsidian Vault Write-Back (filesystem → CouchDB)
          After=obsidian-sync.service
          Requires=obsidian-sync.service

          [Service]
          Type=simple
          ExecStart=/opt/obsidian/vault-writeback.sh
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=obsidian-vault-writeback
          User=root

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      become: yes
      notify:
        - Reload systemd
        - Restart obsidian-vault-writeback
      tags: [service]

    - name: Enable and start vault writeback service
      ansible.builtin.systemd:
        name: obsidian-vault-writeback
        enabled: yes
        state: started
        daemon_reload: yes
      become: yes
      when: not ansible_check_mode
      tags: [service]

    - name: Install cron fallback — full sync every 5 minutes
      ansible.builtin.cron:
        name: obsidian-vault-full-sync
        minute: "*/5"
        job: "/usr/bin/python3 {{ scripts_dir }}/obsidian-sync.py --full-sync >> /var/log/obsidian-sync-cron.log 2>&1"
        user: root
      become: yes
      tags: [cron]

  handlers:

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
      become: yes
      when: not ansible_check_mode

    - name: Restart obsidian-sync
      ansible.builtin.systemd:
        name: obsidian-sync
        state: restarted
      become: yes
      when: not ansible_check_mode

    - name: Restart obsidian-vault-writeback
      ansible.builtin.systemd:
        name: obsidian-vault-writeback
        state: restarted
      become: yes
      when: not ansible_check_mode
