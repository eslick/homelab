---
- name: Configure nginx HTTPS reverse proxy via Tailscale TLS
  hosts: homelab
  gather_facts: yes

  vars:
    tailscale_hostname: speedracer.terrier-haddock.ts.net
    tailscale_ip: "{{ ansible_tailscale0.ipv4.address }}"
    cert_dir: /etc/ssl/tailscale
    arcana_port: 14000
    arcana_beam1_port: 14100
    arcana_beam2_port: 14101
    arcana_cluster_nodes: 1
    vllm_port: 8081
    vllm_nginx_port: 8082

  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: yes
      become: yes
      tags: [install]

    - name: Create Tailscale cert directory
      ansible.builtin.file:
        path: "{{ cert_dir }}"
        state: directory
        mode: '0750'
        owner: root
        group: www-data
      become: yes
      tags: [configure, tls]

    - name: Obtain Tailscale TLS certificate
      ansible.builtin.command:
        cmd: >
          tailscale cert
          --cert-file {{ cert_dir }}/speedracer.crt
          --key-file {{ cert_dir }}/speedracer.key
          {{ tailscale_hostname }}
      become: yes
      changed_when: false
      tags: [configure, tls]

    - name: Set cert file permissions readable by nginx
      ansible.builtin.file:
        path: "{{ item }}"
        owner: root
        group: www-data
        mode: '0640'
      loop:
        - "{{ cert_dir }}/speedracer.crt"
        - "{{ cert_dir }}/speedracer.key"
      become: yes
      when: not ansible_check_mode
      tags: [configure, tls]

    - name: Remove OpenClaw nginx site (decommissioned)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/openclaw
        - /etc/nginx/sites-available/openclaw
      become: yes
      notify: Reload nginx
      tags: [configure]

    - name: Deploy nginx site config for Arcana
      ansible.builtin.template:
        src: ../templates/arcana-nginx.conf.j2
        dest: /etc/nginx/sites-available/arcana
        mode: '0644'
      become: yes
      notify: Reload nginx
      tags: [configure]

    - name: Enable nginx site for Arcana
      ansible.builtin.file:
        src: /etc/nginx/sites-available/arcana
        dest: /etc/nginx/sites-enabled/arcana
        state: link
      become: yes
      notify: Reload nginx
      when: not ansible_check_mode
      tags: [configure]

    - name: Deploy nginx site config for vLLM
      ansible.builtin.template:
        src: ../templates/vllm-nginx.conf.j2
        dest: /etc/nginx/sites-available/vllm
        mode: '0644'
      become: yes
      notify: Reload nginx
      tags: [configure, vllm]

    - name: Enable nginx site for vLLM
      ansible.builtin.file:
        src: /etc/nginx/sites-available/vllm
        dest: /etc/nginx/sites-enabled/vllm
        state: link
      become: yes
      notify: Reload nginx
      when: not ansible_check_mode
      tags: [configure, vllm]

    - name: Remove Obsidian CouchDB nginx site (decommissioned)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/obsidian
        - /etc/nginx/sites-available/obsidian
      become: yes
      notify: Reload nginx
      tags: [configure]

    - name: Disable nginx default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      become: yes
      notify: Reload nginx
      tags: [configure]

    - name: Create nginx systemd drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/system/nginx.service.d
        state: directory
        mode: '0755'
      become: yes
      tags: [service]

    - name: Deploy nginx drop-in to start after Tailscale
      ansible.builtin.copy:
        dest: /etc/systemd/system/nginx.service.d/after-tailscale.conf
        mode: '0644'
        content: |
          [Unit]
          After=tailscaled.service
          Wants=tailscaled.service

          [Service]
          Restart=on-failure
          RestartSec=5s
      become: yes
      notify:
        - Reload systemd
        - Restart nginx
      tags: [service]

    - name: Ensure nginx is running and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes
      become: yes
      ignore_errors: "{{ ansible_check_mode }}"
      tags: [service]

    - name: Remove stale UFW rule for port 443 on Tailscale interface
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        port: '443'
        proto: tcp
        delete: yes
      become: yes
      tags: [security]

    - name: Allow nginx ports through UFW on Tailscale interface
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        port: '{{ item }}'
        proto: tcp
      loop:
        - '2099'
        - '{{ arcana_port }}'
        - '{{ vllm_nginx_port }}'
      become: yes
      tags: [security]

    - name: Schedule weekly Tailscale cert renewal
      ansible.builtin.cron:
        name: tailscale-cert-renew
        job: >-
          tailscale cert
          --cert-file {{ cert_dir }}/speedracer.crt
          --key-file {{ cert_dir }}/speedracer.key
          {{ tailscale_hostname }}
          > /dev/null
          && systemctl reload nginx
        weekday: '0'
        hour: '3'
        minute: '0'
        user: root
      become: yes
      tags: [configure, cron]

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
      become: yes

    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
      become: yes

    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
      become: yes
