---
# Deploys SGLang inference server as an alternative to vLLM.
#
# IMPORTANT: SGLang and vLLM both claim all GPUs (count: all).
# Stop vLLM before starting SGLang:
#   docker compose -f /opt/compose/vllm/docker-compose.yml down
# Swap back to vLLM:
#   docker compose -f /opt/compose/sglang/docker-compose.yml down
#   ansible-playbook playbooks/vllm.yml --tags docker
#
# Model options (override with -e):
#   Gemma 4 27B:  sglang_model_id=cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit  sglang_served_model_name=gemma4-27b   sglang_image=lmsysorg/sglang:gemma4
#   Qwen3.6-35B:  sglang_model_id=Qwen/Qwen3.6-35B-A3B-AWQ               sglang_served_model_name=qwen3.6-35b-a3b  sglang_image=lmsysorg/sglang:latest
#   Qwen3-30B:    sglang_model_id=QuixiAI/Qwen3-30B-A3B-AWQ             sglang_served_model_name=qwen3-30b-a3b    sglang_image=lmsysorg/sglang:v0.5.10.post1
#
# VRAM budget (2× RTX 3090, 24 GB each, TP=2):
#   Gemma 4 26B AWQ-4bit weights: ~14-16 GB total (~7-8 GB/card), ~16-17 GB/card for KV cache.
#   fp8_e4m3 KV cache: effective ~32 GB KV budget across both cards.
#   context-length=65536 is conservative; probe-context mode finds the true ceiling.

- name: Deploy SGLang GPU container
  hosts: homelab
  gather_facts: no

  vars:
    compose_base: /opt/compose
    docker_network: homelab-net

    sglang_port: 8081
    sglang_image: "lmsysorg/sglang:latest"
    sglang_model_id: "QuantTrio/Qwen3.6-35B-A3B-AWQ"
    sglang_served_model_name: "qwen3.6-35b-a3b"
    sglang_tensor_parallel_size: 2
    sglang_max_model_len: 65536
    sglang_gpu_memory_fraction: "0.88"
    sglang_extra_args: >-
      --chunked-prefill-size 8192
      --max-running-requests 32
      --attention-backend flashinfer
      --mamba-backend flashinfer
      --mamba-scheduler-strategy no_buffer
      --mamba-ssm-dtype bfloat16
      --reasoning-parser qwen3
      --tool-call-parser qwen
    sglang_awq_patch: true
    sglang_json_model_override_args: '{"rope_scaling":{"rope_type":"yarn","factor":2.0,"original_max_position_embeddings":32768}}'

  tasks:

    - name: Ensure vLLM is stopped (SGLang needs exclusive GPU access)
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/vllm"
        state: absent
      become: yes
      ignore_errors: yes  # vLLM may not be deployed
      tags: [docker, sglang]

    - name: Create SGLang compose directory
      ansible.builtin.file:
        path: "{{ compose_base }}/sglang"
        state: directory
        mode: '0755'
      become: yes
      tags: [install, sglang]

    - name: Deploy SGLang compose file from template
      ansible.builtin.template:
        src: ../templates/sglang-compose.yml.j2
        dest: "{{ compose_base }}/sglang/docker-compose.yml"
        mode: '0644'
      become: yes
      tags: [configure, sglang]

    - name: Pull SGLang image
      community.docker.docker_image:
        name: "{{ sglang_image }}"
        source: pull
        force_source: no
      become: yes
      tags: [docker, sglang]

    - name: Start SGLang container
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base }}/sglang"
        state: present
      become: yes
      tags: [docker, sglang]

    - name: Allow SGLang port from localhost
      community.general.ufw:
        rule: allow
        port: "{{ sglang_port }}"
        proto: tcp
        from_ip: 127.0.0.1
      become: yes
      tags: [security, sglang]

    - name: Allow SGLang port from Docker bridge subnet
      community.general.ufw:
        rule: allow
        port: "{{ sglang_port }}"
        proto: tcp
        from_ip: "{{ docker_network_subnet | default('172.18.0.0/16') }}"
      become: yes
      tags: [security, sglang]

    - name: Deny SGLang port from everywhere else
      community.general.ufw:
        rule: deny
        port: "{{ sglang_port }}"
        proto: tcp
      become: yes
      tags: [security, sglang]
