# Qwen3.6-27B-AWQ — dense, full 27B params, QuantTrio AWQ quantization
# TP=2 across both 3090s; same AWQ build approach as working MoE model
# ~14GB VRAM per GPU; sglang_awq_patch required (same as MoE)
sglang_model_id: "QuantTrio/Qwen3.6-27B-AWQ"
sglang_served_model_name: "qwen3.6-27b"
sglang_image: "sglang-base:working"
sglang_tensor_parallel_size: 2
sglang_max_model_len: 32768
sglang_gpu_memory_fraction: "0.88"
sglang_extra_args: >-
  --chunked-prefill-size 8192
  --max-running-requests 8
  --attention-backend flashinfer
  --reasoning-parser qwen3
  --tool-call-parser qwen25
sglang_awq_patch: true
sglang_json_model_override_args: ""
