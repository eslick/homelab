# Qwen3-32B-AWQ — dense, full 32B params, higher quality ceiling, slower decode
# TP=2 across both 3090s; standard transformer architecture (no mamba)
# NOTE: verify HF model ID — update sglang_model_id if using a different quantization
sglang_model_id: "bartowski/Qwen3-32B-AWQ"
sglang_served_model_name: "qwen3-32b"
sglang_image: "sglang-base:working"
sglang_tensor_parallel_size: 2
sglang_max_model_len: 32768
sglang_gpu_memory_fraction: "0.88"
sglang_extra_args: >-
  --chunked-prefill-size 8192
  --max-running-requests 8
  --attention-backend flashinfer
  --reasoning-parser qwen3
  --tool-call-parser qwen
sglang_awq_patch: false
sglang_json_model_override_args: ""
